name: 自动编译远程Keybox检测（Debug）
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 赋予Gradle执行权限
        run: chmod +x ./gradlew

      - name: 编译Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: KeyboxCheckDemo-Debug
          path: app/build/outputs/apk/debug/*.apk
